name: Python bindings

on:
  push:
  pull_request:

env:
  HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
  HOMEBREW_NO_AUTO_UPDATE: 1

jobs:
  test:
    name: build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
        python-version: [3.9]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download source
        run: |
          git clone https://github.com/arvidn/libtorrent.git --depth=1 --recurse-submodules --branch RC_2_0
          cd libtorrent

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          # Install required SDKs and tools
          choco install visualstudio2022buildtools -y --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended"
          choco install vcpkg -y
          # Use vcpkg to get Boost and OpenSSL
          vcpkg integrate install
          vcpkg install boost-system boost-python:x64-windows openssl:x64-windows --triplet x64-windows

      - name: Setup MSVC Environment (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "%ProgramFiles(x86)%\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          set VCPKG_ROOT=%USERPROFILE%\vcpkg
          set BOOST_ROOT=%VCPKG_ROOT%\installed\x64-windows
          set OpenSSL_DIR=%VCPKG_ROOT%\installed\x64-windows

      - name: Build and install (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd libtorrent\bindings\python
          python -m pip install --upgrade pip setuptools wheel
          python setup.py build_ext --b2-args "defines=BOOST_ALL_NO_LIB link=static" install --user

      - name: Install dependencies (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          if [ "$(uname)" = "Darwin" ]; then
            brew update
            brew install boost boost-python3 python@3.9 openssl@3 python-setuptools ccache
            export PATH="$(brew --prefix)/opt/python@3.9/bin:$PATH"
          else
            sudo apt-get update
            sudo apt-get install -y libboost-system-dev libboost-python-dev libboost-dev libboost-tools-dev python3 python3-setuptools libssl-dev nasm ccache
          fi

      - name: Build and install (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          cd libtorrent/bindings/python
          python3 -m pip install --upgrade pip setuptools wheel
          python3 setup.py build_ext --b2-args "deprecated-functions=off link=static asserts=on" install --user
