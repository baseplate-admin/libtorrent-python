name: Windows Libtorrent Build

on:
  push:
  pull_request:

jobs:
  windows-build:
    runs-on: windows-2022
    name: Build Libtorrent Python (Windows)

    env:
      BOOST_VERSION: 1_83_0
      BOOST_DIR: C:\Libraries\boost_1_83_0
      OPENSSL_ROOT: C:\OpenSSL
      OPENSSL_VERSION: OpenSSL_1_1_1w
      PYTHON_DIR: C:\hostedtoolcache\windows\Python\3.13.5\x64

    steps:
      - name: Download source
        run: |
          git clone https://github.com/arvidn/libtorrent.git --depth=1 --recurse-submodules --branch master


      - name: Install dependencies
        run: |
          choco install strawberryperl ninja -y
          python -m pip install --upgrade pip setuptools wheel

      - name: Install NASM
        run: choco install nasm -y
        shell: cmd

      - name: Build OpenSSL from source
        shell: pwsh
        env:
          OPENSSL_ROOT: C:\OpenSSL
          OPENSSL_VERSION: OpenSSL_1_1_1w
        run: |
          git clone --branch $env:OPENSSL_VERSION https://github.com/openssl/openssl.git
          cd openssl

          # Run Visual Studio environment setup and build inside one script block
          & 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat'

          # Now perl and nmake are available, configure and build OpenSSL
          perl Configure VC-WIN64A no-shared no-tests --prefix=$env:OPENSSL_ROOT
          nmake
          nmake install_sw


      - name: Download and extract Boost
        run: |
          Invoke-WebRequest -Uri "https://boostorg.jfrog.io/artifactory/main/release/1.83.0/source/boost_${env:BOOST_VERSION}.zip" -OutFile boost.zip
          Expand-Archive boost.zip -DestinationPath C:\Libraries

      - name: Bootstrap Boost Build
        run: |
          cd $env:BOOST_DIR\tools\build
          .\bootstrap.bat
        shell: pwsh

      - name: Set up Boost Python config
        run: |
          $py = "$env:PYTHON_DIR\python.exe"
          $version = & $py -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')"
          $include = "$env:PYTHON_DIR\include"
          $libs = "$env:PYTHON_DIR\libs"
          "using msvc ;`nusing python : $version : $py : $include : $libs ;" | Set-Content "$env:HOMEDRIVE$env:HOMEPATH\user-config.jam"
          type "$env:HOMEDRIVE$env:HOMEPATH\user-config.jam"
        shell: pwsh

      - name: Build libtorrent (b2)
        run: |
          b2 -j2 --hash ^
            openssl-lib=$env:OPENSSL_ROOT\lib ^
            openssl-include=$env:OPENSSL_ROOT\include ^
            warnings=all ^
            msvc address-model=64 ^
            picker-debugging=on invariant-checks=full ^
            variant=release link=static ^
            crypto=openssl webtorrent=on asserts=on export-extra=on ^
            windows-api=desktop windows-version=win10 cxxstd=17
        shell: cmd

      - name: Build Python bindings (stage)
        run: |
          cd bindings\python
          b2 -j2 --hash ^
            openssl-lib=$env:OPENSSL_ROOT\lib ^
            openssl-include=$env:OPENSSL_ROOT\include ^
            warnings=all ^
            msvc address-model=64 ^
            picker-debugging=on invariant-checks=full ^
            variant=release link=static ^
            crypto=openssl webtorrent=on asserts=on export-extra=on ^
            libtorrent-link=static stage_module stage_dependencies
        shell: cmd

      - name: Build Python wheel
        run: |
          cd bindings\python
          python setup.py bdist_wheel
        shell: cmd

      - name: Upload Python wheel
        uses: actions/upload-artifact@v4
        with:
          name: libtorrent-python-wheel
          path: bindings/python/dist/*.whl
