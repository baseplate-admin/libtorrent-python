name: Windows Libtorrent Build

on:
  push:
  pull_request:

jobs:
  windows-build:
    runs-on: windows-latest
    name: Build Libtorrent Python (Windows)

    env:
      OPENSSL_ROOT: C:\OpenSSL
      OPENSSL_VERSION: OpenSSL_1_1_1w
      BOOST_ROOT: ${{ github.workspace }}\boost

    steps:
      - name: Download source
        run: |
            git clone https://github.com/arvidn/libtorrent.git --depth=1 --recurse-submodules --branch master

      - name: Install dependencies
        run: |
          choco install strawberryperl ninja nasm cmake -y
          python -m pip install --upgrade pip setuptools wheel

      - name: Build OpenSSL from source
        shell: cmd
        run: |
          set PATH=%PATH%;"C:\Program Files\NASM"
          git clone --branch %OPENSSL_VERSION% https://github.com/openssl/openssl.git
          cd openssl
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && ^
          perl Configure VC-WIN64A no-shared no-tests --prefix=%OPENSSL_ROOT% && ^
          nmake && ^
          nmake install_sw

      - name: Build Boost with C++23 support
        shell: cmd
        run: |
          git clone --depth=1 --recurse-submodules -b boost-1.84.0 https://github.com/boostorg/boost.git boost
          cd boost
          bootstrap.bat
          b2 cxxstd=23 release link=shared address-model=64 --with-python --with-system --prefix=%BOOST_ROOT% install

      - name: Configure with CMake (C++23)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          mkdir libtorrent\build
          cd libtorrent\build
          cmake -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_CXX_STANDARD=23 ^
            -DCMAKE_CXX_STANDARD_REQUIRED=ON ^
            -DCMAKE_CXX_EXTENSIONS=OFF ^
            -DBOOST_ROOT=%BOOST_ROOT% ^
            -DBoost_NO_SYSTEM_PATHS=ON ^
            -DBoost_NO_BOOST_CMAKE=ON ^
            -DBoost_USE_STATIC_LIBS=OFF ^
            -DBoost_DEBUG=ON ^
            -DOPENSSL_ROOT_DIR=%OPENSSL_ROOT% ^
            -Dpython-bindings=ON ^
            -DCMAKE_POLICY_VERSION_MINIMUM=3.10 ^
            -DCMAKE_POLICY_DEFAULT_CMP0074=NEW ^
            -DCMAKE_POLICY_DEFAULT_CMP0144=NEW ^
            -DCMAKE_POLICY_DEFAULT_CMP0167=NEW ^
            -DCMAKE_POLICY_DEFAULT_CMP0183=NEW ^
            -Dwebtorrent=ON ^
            ..

      - name: Build with CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd libtorrent\build
          cmake --build . --config Release --parallel %NUMBER_OF_PROCESSORS%

      - name: Build Python wheel
        shell: cmd
        run: |
          set LT_CMAKE_BUILD=%cd%\build
          cd libtorrent\bindings\python
          python setup.py bdist_wheel

      - name: Upload Python wheel
        uses: actions/upload-artifact@v4
        with:
          name: libtorrent-python-wheel
          path: libtorrent\bindings\python\dist\*.whl