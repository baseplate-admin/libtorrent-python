name: Windows Libtorrent Build

on:
  push:
  pull_request:

jobs:
  windows-build:
    runs-on: windows-latest
    name: Build Libtorrent Python (Windows)

    env:
      OPENSSL_ROOT: C:\OpenSSL
      OPENSSL_VERSION: OpenSSL_1_1_1w
      PYTHON_VERSION: 3.13
      PYTHON_DIR: C:\hostedtoolcache\windows\Python\${{ env.PYTHON_VERSION }}.5\x64
      BOOST_ROOT: ${{ github.workspace }}\boost

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: arvidn/libtorrent
          submodules: recursive
          ref: master

      - name: Install dependencies
        run: |
          choco install strawberryperl ninja nasm cmake -y
          python -m pip install --upgrade pip setuptools wheel

      - name: Build OpenSSL from source
        shell: cmd
        run: |
          set PATH=%PATH%;"C:\Program Files\NASM"
          git clone --branch %OPENSSL_VERSION% https://github.com/openssl/openssl.git
          cd openssl
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && ^
          perl Configure VC-WIN64A no-shared no-tests --prefix=%OPENSSL_ROOT% && ^
          nmake && ^
          nmake install_sw

      - name: Build Boost with correct Python binding
        shell: cmd
        run: |
          git clone --depth=1 --recurse-submodules -b boost-1.78.0 https://github.com/boostorg/boost.git boost
          cd boost
          bootstrap.bat
          echo using python : $env:PYTHON_VERSION : "$env:PYTHON_DIR\python.exe" : "$env:PYTHON_DIR\include" : "$env:PYTHON_DIR\libs" ; > user-config.jam
          b2 cxxstd=14 release link=shared address-model=64 --with-python ^
             --with-system --user-config=user-config.jam --prefix=stage install

      - name: Configure with CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          mkdir build
          cd build
          cmake -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_CXX_STANDARD=14 ^
            -DBOOST_INCLUDEDIR=%BOOST_ROOT%\stage\include ^
            -DBOOST_LIBRARYDIR=%BOOST_ROOT%\stage\lib ^
            -DOPENSSL_ROOT_DIR=%OPENSSL_ROOT% ^
            -Dpython-bindings=ON ^
            -DCMAKE_POLICY_VERSION_MINIMUM=3.10 ^
            -Dwebtorrent=ON ^
            -Dboost-python-module-name=python${{ env.PYTHON_VERSION | replace('.', '') }} ^
            -DPython_EXECUTABLE=%PYTHON_DIR%\python.exe ^
            -DPython_INCLUDE_DIR=%PYTHON_DIR%\include ^
            -DPython_LIBRARY=%PYTHON_DIR%\libs\python${{ env.PYTHON_VERSION | replace('.', '') }}.lib ^
            ..

      - name: Build with CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd build
          cmake --build . --config Release --parallel %NUMBER_OF_PROCESSORS%

      - name: Build Python wheel
        shell: cmd
        run: |
          set LT_CMAKE_BUILD=%cd%\build
          cd bindings\python
          python setup.py bdist_wheel

      - name: Upload Python wheel
        uses: actions/upload-artifact@v4
        with:
          name: libtorrent-python-wheel
          path: bindings\python\dist\*.whl