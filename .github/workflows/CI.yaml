name: Windows Libtorrent Build

on:
  push:
  pull_request:

jobs:
  windows-build:
    runs-on: windows-latest
    name: Build Libtorrent Python (Windows)

    env:
      OPENSSL_ROOT: C:\OpenSSL
      OPENSSL_VERSION: OpenSSL_1_1_1w
      PYTHON_DIR: C:\hostedtoolcache\windows\Python\3.13.5\x64
      BOOST_ROOT: ${{ github.workspace }}\libtorrent\boost

    steps:
      - name: Install dependencies
        run: |
          choco install strawberryperl ninja nasm cmake -y
          python -m pip install --upgrade pip setuptools wheel

      - name: Build OpenSSL from source
        shell: cmd
        run: |
          set PATH=%PATH%;"C:\Program Files\NASM"
          git clone --branch %OPENSSL_VERSION% https://github.com/openssl/openssl.git
          cd openssl
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && ^
          perl Configure VC-WIN64A no-shared no-tests --prefix=%OPENSSL_ROOT% && ^
          nmake && ^
          nmake install_sw

      - name: Install Boost (windows)
        shell: cmd
        run: |
          mkdir libtorrent
          cd libtorrent
          git clone --depth=1 --recurse-submodules -j10 --branch=boost-1.78.0 https://github.com/boostorg/boost.git boost
          cd boost
          bootstrap.bat

      - name: Build Boost libraries
        shell: cmd
        run: |
          cd libtorrent\boost
          .\b2 --with-system --with-python variant=release link=shared runtime-link=shared address-model=64 stage

      - name: Build libjuice (dependency of libdatachannel)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd libtorrent\deps\libdatachannel\deps\libjuice
          mkdir build
          cd build
          cmake .. -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF
          nmake

      - name: Set up Python environment
        shell: pwsh
        run: |
          $py = "$env:PYTHON_DIR\python.exe"
          $version = & $py -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')"
          $include = "$env:PYTHON_DIR\include"
          $libs = "$env:PYTHON_DIR\libs"
          "using msvc ;`nusing python : $version : $py : $include : $libs ;" |
            Set-Content "$env:HOMEDRIVE$env:HOMEPATH\user-config.jam"
          $pythonPath = "$env:PYTHON_DIR;$env:PYTHON_DIR\Scripts;"
          echo "PATH=$pythonPath$env:PATH" |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LIBJUICE_INCLUDE=$env:GITHUB_WORKSPACE\libtorrent\deps\libdatachannel\deps\libjuice\include" >> $env:GITHUB_ENV
          echo "LIBJUICE_LIB=$env:GITHUB_WORKSPACE\libtorrent\deps\libdatachannel\deps\libjuice\build" >> $env:GITHUB_ENV

      - name: Configure with CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd libtorrent
          mkdir build
          cd build
          cmake -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DBOOST_ROOT=..\boost ^
            -DBOOST_LIBRARYDIR=..\boost\stage\lib ^
            -DOPENSSL_ROOT_DIR=%OPENSSL_ROOT% ^
            -Dpython-bindings=ON ^
            -Dwebtorrent=ON ^
            -Dlibjuice_INCLUDE_DIR=%LIBJUICE_INCLUDE% ^
            -Dlibjuice_LIBRARY=%LIBJUICE_LIB%\juice.lib ^
            -Dboost-python-module-name=python ^
            -DPython_EXECUTABLE=%PYTHON_DIR%\python.exe ^
            -DPython_INCLUDE_DIR=%PYTHON_DIR%\include ^
            -DPython_LIBRARY=%PYTHON_DIR%\libs\python313.lib ^
            ..

      - name: Build with CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd libtorrent\build
          cmake --build . --config Release

      - name: Build Python wheel
        shell: cmd
        run: |
          cd libtorrent\bindings\python
          python setup.py bdist_wheel

      - name: Upload Python wheel
        uses: actions/upload-artifact@v4
        with:
          name: libtorrent-python-wheel
          path: libtorrent\bindings\python\dist\*.whl