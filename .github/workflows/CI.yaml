name: Build Python Bindings

on:
  push:
  pull_request:
    

jobs:
  build-python-bindings:
    runs-on: windows-latest
    env:
      BOOST_VERSION: 1.83.0
      BOOST_ROOT: C:\\Libraries\\boost
      SSL_ROOT: C:\\OpenSSL-v111-Win64
      SSL_LIB: C:\\OpenSSL-v111-Win64\\lib
      SSL_INCLUDE: C:\\OpenSSL-v111-Win64\\include

    steps:
    - name: Clone libtorrent
      run: |
        git clone https://github.com/arvidn/libtorrent.git --branch master --recurse-submodules
        cd libtorrent
        git submodule update --init --recursive --depth 1

    - name: Clone Boost
      run: |
        git clone https://github.com/boostorg/boost.git --branch boost-${{ env.BOOST_VERSION }} --recurse-submodules $env:BOOST_ROOT
        cd $env:BOOST_ROOT
        git submodule update --init --recursive --depth 1

    - name: Install Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        architecture: 'x64'

    - name: Install dependencies
      run: |
        python -m pip install websockets

    - name: Install OpenSSL
      run: |
        $url = "https://slproweb.com/download/Win64OpenSSL-1_1_1w.exe"
        $output = "$env:RUNNER_TEMP\Win64OpenSSL.exe"
        Invoke-WebRequest -Uri $url -OutFile $output
        Start-Process $output -ArgumentList '/silent', '/verysilent', '/sp-', '/suppressmsgboxes', "/DIR=$env:SSL_ROOT" -Wait

    - name: Configure Boost.Build
      run: |
        $pythonDir = "$(python -c 'import sys; print(sys.prefix)')"
        $pythonVersion = "$(python -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
        $configContent = "using msvc ;`nusing python : $pythonVersion : `"$pythonDir`" : `"$pythonDir\\include`" : `"$pythonDir\\libs`" ;"
        $configContent | Out-File -FilePath "$env:HOMEDRIVE$env:HOMEPATH\user-config.jam" -Encoding ascii
        type "$env:HOMEDRIVE$env:HOMEPATH\user-config.jam"

    - name: Build Boost.Python
      run: |
        cd $env:BOOST_ROOT
        .\bootstrap.bat
        .\b2.exe --with-python variant=release address-model=64 link=shared runtime-link=shared define=MS_WIN64 stage toolset=msvc

    - name: Build libtorrent
      run: |
        cd libtorrent
        $env:BOOST_BUILD_PATH = "$env:BOOST_ROOT\\tools\\build"
        $env:PATH += ";$env:BOOST_BUILD_PATH"
        b2.exe openssl-lib=$env:SSL_LIB openssl-include=$env:SSL_INCLUDE variant=release compiler=msvc address-model=64 link=shared crypto=openssl webtorrent=on cxxstd=17

    - name: Build Python bindings
      run: |
        cd libtorrent/bindings/python
        b2.exe openssl-lib=$env:SSL_LIB openssl-include=$env:SSL_INCLUDE variant=release compiler=msvc address-model=64 link=shared crypto=openssl webtorrent=on libtorrent-link=shared stage_module

    - name: Package Python bindings
      run: |
        cd libtorrent/bindings/python
        python setup.py bdist --format=msi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-module
        path: libtorrent/bindings/python/dist/*.msi
