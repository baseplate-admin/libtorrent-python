name: Windows Libtorrent Build

on:
  push:
  pull_request:

jobs:
  windows-build:
    runs-on: windows-latest
    name: Build Libtorrent Python (Windows)

    env:
      BOOST_VERSION: 1.84.0
      OPENSSL_VERSION: 1.1.1w

    steps:
      - name: Download source
        run: |
              git clone https://github.com/arvidn/libtorrent.git --depth=1 --recurse-submodules --branch master

      - name: Install dependencies
        run: |
          choco install ninja cmake -y
          python -m pip install --upgrade pip setuptools wheel

      - name: Download and extract prebuilt OpenSSL
        shell: cmd
        run: |
          curl -L -o openssl.zip https://github.com/indygreg/openssl-windows-builds/releases/download/2023-11-22/openssl-1.1.1w-windows-x86_64.zip
          7z x openssl.zip -oC:\OpenSSL
          ren "C:\OpenSSL\openssl-1.1.1w-windows-x86_64" OpenSSL

      - name: Install prebuilt Boost
        shell: cmd
        run: |
          curl -L -o boost.zip https://sourceforge.net/projects/boost/files/boost-binaries/%BOOST_VERSION%/boost_1_84_0-msvc-14.3-64.exe/download
          7z x boost.zip -oC:\Boost
          ren "C:\Boost\boost_1_84_0" Boost

      - name: Configure with CMake (C++23)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd libtorrent  # Enter the libtorrent directory
          mkdir build
          cd build
          cmake -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_CXX_STANDARD=23 ^
            -DCMAKE_CXX_STANDARD_REQUIRED=ON ^
            -DCMAKE_CXX_EXTENSIONS=OFF ^
            -DBOOST_ROOT="C:\Boost" ^
            -DBoost_INCLUDE_DIR="C:\Boost\include\boost-1_84" ^
            -DBoost_LIBRARY_DIR="C:\Boost\lib64-msvc-14.3" ^
            -DOPENSSL_ROOT_DIR="C:\OpenSSL" ^
            -DOPENSSL_INCLUDE_DIR="C:\OpenSSL\include" ^
            -DOPENSSL_CRYPTO_LIBRARY="C:\OpenSSL\lib\libcrypto.lib" ^
            -DOPENSSL_SSL_LIBRARY="C:\OpenSSL\lib\libssl.lib" ^
            -Dpython-bindings=ON ^
            -DCMAKE_POLICY_DEFAULT_CMP0074=NEW ^
            -DCMAKE_POLICY_DEFAULT_CMP0144=NEW ^
            -DCMAKE_POLICY_DEFAULT_CMP0167=NEW ^
            -DCMAKE_POLICY_DEFAULT_CMP0183=NEW ^
            -Dwebtorrent=ON ^
            ..

      - name: Build with CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd libtorrent\build  # Build inside the libtorrent directory
          cmake --build . --config Release --parallel %NUMBER_OF_PROCESSORS%

      - name: Build Python wheel
        shell: cmd
        run: |
          set LT_CMAKE_BUILD=%cd%\libtorrent\build
          cd libtorrent\bindings\python  # Enter the bindings directory
          python setup.py bdist_wheel

      - name: Upload Python wheel
        uses: actions/upload-artifact@v4
        with:
          name: libtorrent-python-wheel
          path: libtorrent\bindings\python\dist\*.whl  # Correct path to wheels