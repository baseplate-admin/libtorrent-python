name: Python bindings

on:
  push:
  pull_request:

env:
  BOOST_VERSION: 1_83_0
  BOOST_ROOT: C:\Libraries\boost_1_83_0
  BOOST_BUILD_PATH: C:\Libraries\boost_1_83_0\tools\build
  OPENSSL_DIR: C:\OpenSSL-v111-Win64

jobs:
  windows-build:
    name: Windows ${{ matrix.variant }} ${{ matrix.model }}bit
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        variant: [debug, release]
        model: [64]
        include:
          - webtorrent: on
          - crypto: openssl

    steps:
      - name: Checkout libtorrent
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Latest Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'  # This picks the latest stable version

      - name: Install Python deps
        run: python -m pip install --upgrade pip setuptools wheel websockets

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set environment variables
        run: |
          echo "BOOST_ROOT=$env:BOOST_ROOT" >> $env:GITHUB_ENV
          echo "BOOST_BUILD_PATH=$env:BOOST_BUILD_PATH" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$env:OPENSSL_DIR\include" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$env:OPENSSL_DIR\lib" >> $env:GITHUB_ENV
          echo "PATH=$env:BOOST_BUILD_PATH;$env:BOOST_ROOT;$env:OPENSSL_DIR\bin;$env:PATH" >> $env:GITHUB_ENV

      - name: Write user-config.jam
        run: |
          $pythonPath = (Get-Command python).Path
          $pythonDir = Split-Path $pythonPath -Parent
          $include = "$pythonDir\include"
          $libs = "$pythonDir\libs"
          $version = & python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')"
          "using msvc ;`nusing python : $version : $pythonPath : $include : $libs ;" | Out-File "$env:HOMEDRIVE$env:HOMEPATH\user-config.jam" -Encoding ascii
          type "$env:HOMEDRIVE$env:HOMEPATH\user-config.jam"

      - name: Bootstrap Boost
        run: |
          cd $env:BOOST_BUILD_PATH
          .\bootstrap.bat

      - name: Build libtorrent
        run: |
          cd $env:GITHUB_WORKSPACE
          b2.exe -j2 --hash \
            openssl-lib=$env:OPENSSL_LIB_DIR \
            openssl-include=$env:OPENSSL_INCLUDE_DIR \
            warnings=all warnings-as-errors=on \
            msvc address-model=${{ matrix.model }} \
            picker-debugging=on invariant-checks=full \
            variant=${{ matrix.variant }} link=shared \
            crypto=${{ matrix.crypto }} webtorrent=${{ matrix.webtorrent }} \
            asserts=on export-extra=on \
            windows-api=desktop windows-version=win10 cxxstd=17

      - name: Build Python bindings
        run: |
          cd bindings\python
          b2.exe -j2 --hash \
            openssl-lib=$env:OPENSSL_LIB_DIR \
            openssl-include=$env:OPENSSL_INCLUDE_DIR \
            warnings=all \
            msvc address-model=${{ matrix.model }} \
            picker-debugging=on invariant-checks=full \
            variant=${{ matrix.variant }} link=shared \
            crypto=${{ matrix.crypto }} webtorrent=${{ matrix.webtorrent }} \
            asserts=on export-extra=on \
            windows-api=desktop windows-version=win10 libtorrent-link=shared stage_module stage_dependencies

      - name: Build Python Wheel
        run: |
          cd bindings\python
          python setup.py bdist_wheel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-module-${{ matrix.variant }}-${{ matrix.model }}bit
          path: bindings/python/dist/*.whl
